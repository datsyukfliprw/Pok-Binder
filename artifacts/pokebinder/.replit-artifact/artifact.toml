kind = "web"
previewPath = "/"
title = "PokéBinder"
version = "1.0.0"
id = "artifacts/pokebinder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18781

[services.development]
run = "pnpm --filter @workspace/pokebinder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokebinder", "run", "build" ]
publicDir = "artifacts/pokebinder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18781"
BASE_PATH = "/"
